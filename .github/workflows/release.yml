name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve CI keystore password
        env:
          CI_KEYSTORE_PASSWORD: ${{ secrets.CI_KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$CI_KEYSTORE_PASSWORD" ]; then
            echo "KEYSTORE_PASSWORD=$CI_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "CI_KEYSTORE_SECRET_SET=true" >> "$GITHUB_ENV"
          else
            echo "KEYSTORE_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"
            echo "CI_KEYSTORE_SECRET_SET=false" >> "$GITHUB_ENV"
          fi

      - name: Cache keystore
        id: cache-keystore
        if: env.CI_KEYSTORE_SECRET_SET == 'true'
        uses: actions/cache@v6
        with:
          path: orpheus-ci.jks
          key: ${{ runner.os }}-keystore-orpheus

      - name: Generate keystore if not cached
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          keytool -genkey -v -keystore orpheus-ci.jks -alias orpheus-key -keyalg RSA -keysize 4096 -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" -keypass "$KEYSTORE_PASSWORD" \
            -dname "CN=Orpheus, OU=Dev, O=Orpheus, L=World, S=World, C=US"

      - name: Create keystore.properties
        run: |
          echo "storeFile=orpheus-ci.jks" > keystore.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> keystore.properties
          echo "keyAlias=orpheus-key" >> keystore.properties
          echo "keyPassword=$KEYSTORE_PASSWORD" >> keystore.properties

      - name: Build release APKs
        run: ./gradlew :app:assembleRelease -Porpheus.enableAbiSplits=true

      - name: Rename APKs for Obtainium
        run: |
          mkdir -p release-artifacts
          VERSION="${GITHUB_REF_NAME#v}"
          for apk in app/build/outputs/apk/release/app-*-release.apk; do
            abi=$(basename "$apk" .apk | sed -E 's/^app-(.+)-release$/\1/')
            cp "$apk" "release-artifacts/Orpheus-${VERSION}-${abi}.apk"
          done
          ls -la release-artifacts/

      - name: Clear previous release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq .id 2>/dev/null || true)"
          if [ -z "$release_id" ] || [ "$release_id" = "null" ]; then
            echo "No existing release for ${GITHUB_REF_NAME}; skipping asset cleanup."
            exit 0
          fi
          gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" --paginate --jq '.[].id' |
            while read -r asset_id; do
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
            done

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
          generate_release_notes: true
          append_body: false
          overwrite_files: true
