name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build release APKs
        env:
          NIXPKGS_ALLOW_UNFREE: 1
          NIXPKGS_ACCEPT_ANDROID_SDK_LICENSE: 1
        run: |
          nix build .#default --impure
          export ANDROID_SDK_ROOT="$PWD/.android-sdk"
          rm -rf "$ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT"
          NIX_ANDROID=$(ls -d /nix/store/*-androidsdk | tail -1)
          cp -a "$NIX_ANDROID/libexec/android-sdk/." "$ANDROID_SDK_ROOT/"
          chmod -R u+w "$ANDROID_SDK_ROOT"
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./result/bin/orpheus-android-fhs ./gradlew assembleRelease \
            -Porcheus.disableReleaseSigning=true \
            --no-daemon --no-configuration-cache

      - name: Rename APKs for Obtainium
        run: |
          mkdir -p release-artifacts
          VERSION="${GITHUB_REF_NAME#v}"
          for apk in app/build/outputs/apk/release/*.apk; do
            abi=$(basename "$apk" | sed -E 's/app-([^-]+)-release.apk/\1/')
            cp "$apk" "release-artifacts/Orpheus-${VERSION}-${abi}.apk"
          done
          ls -la release-artifacts/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
